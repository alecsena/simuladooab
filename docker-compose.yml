services:
  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=oab_simulado
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ES_HOST=elasticsearch:9200
      - MONGO_URI=mongodb://mongodb:27017/oab_simulado
      - JWT_SECRET=oab_simulado_jwt_secret_change_in_production
      - ADMIN_EMAIL=admin@oab.com
      - ADMIN_PASSWORD=admin123
      - ADMIN_NAME=Administrador
      - DATA_DIR=/data/questoes
    volumes:
      - ./data:/data/questoes:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  es_data:
  mongo_data:
